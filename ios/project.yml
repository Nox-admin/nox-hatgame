name: HatGame
options:
  bundleIdPrefix: xyz.noxlabs
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: xyz.noxlabs.hatgame
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: HatGame/Info.plist
    DEVELOPMENT_TEAM: ""

targets:
  HatGameUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HatGameUITests
    settings:
      base:
        BUNDLE_LOADER: ""
        TEST_TARGET_NAME: HatGame
    dependencies:
      - target: HatGame

  HatGame:
    type: application
    platform: iOS
    sources:
      - path: HatGame
        excludes:
          - "**/*.md"
    resources:
      - path: HatGame/Resources
      - path: HatGame/Assets.xcassets
    info:
      path: HatGame/Info.plist
      properties:
        CFBundleDisplayName: Шляпа
        CFBundleName: HatGame
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
