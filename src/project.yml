name: HatGame
options:
  bundleIdPrefix: xyz.noxlabs
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: xyz.noxlabs.hatgame
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: HatGame/Info.plist
    DEVELOPMENT_TEAM: "M8WF924972"

targets:
  HatGame:
    type: application
    platform: iOS
    sources:
      - path: HatGame
        excludes:
          - "**/*.md"
          - "Resources/Localizable.xcstrings"
    resources:
      - path: HatGame/Resources
        excludes:
          - "Localizable.xcstrings"
      - path: HatGame/Assets.xcassets
    info:
      path: HatGame/Info.plist
      properties:
        CFBundleDisplayName: Shlyapa 2
        CFBundleName: HatGame
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - ru
          - en
          - zh-Hans
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
